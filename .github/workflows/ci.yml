name: CI/CD

on:
  push:
    branches: [main, next]
  pull_request:
    branches: [main, next]
  workflow_dispatch:
    inputs:
      allow_major:
        description: "Permit a major (breaking) release on main"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    uses: argh/ci/.github/workflows/release-node.yml@v1
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
    secrets: inherit
    with:
      allow_major: ${{ inputs.allow_major || false }}
